<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather app - Manage Locations</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <style>
        .locations-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px; }
        .add-location-form { background: rgba(255, 255, 255, 0.03); border-radius: 32px; padding: 32px; border: 1px dashed rgba(255, 255, 255, 0.1); display: flex; gap: 16px; align-items: center; }
        .add-btn { background: var(--primary); color: var(--on-primary); border: none; padding: 16px 32px; border-radius: 99px; cursor: pointer; font-family: 'Space Grotesk'; font-weight: 700; transition: all 0.3s ease; }
        .add-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(56, 189, 248, 0.4); }
    </style>
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="logo">Weather app</div>
            <nav class="nav-links">
                <a href="index.html" class="nav-item">Dashboard</a>
                <a href="forecast.html" class="nav-item">Forecast</a>
                <a href="locations.html" class="nav-item active">Locations</a>
                <a href="maps.html" class="nav-item">Maps</a>
            </nav>
            <div style="margin-top: auto; display: flex; flex-direction: column; gap: 8px;">
                <p style="font-size: 0.75rem; color: var(--on-surface-variant); padding: 0 24px;">Made by Sarthak</p>
                <button onclick="handleSignOut()" class="nav-item" style="padding: 12px 24px; font-size: 0.875rem; background: none; border: none; color: #ef4444; width: 100%; text-align: left; cursor: pointer;">Sign Out</button>
            </div>
        </aside>

        <main class="content">
            <header>
                <h2 class="logo" style="font-size: 2rem;">Manage Locations</h2>
                <p class="metric-label">Saved atmospheric access points</p>
            </header>

            <div class="add-location-form">
                <input type="text" id="new-location-input" placeholder="Enter City Name..." class="nav-item glass" style="flex: 1; margin: 0; background: rgba(0,0,0,0.2);">
                <button class="add-btn" onclick="addLocation()">Add Location</button>
            </div>

            <section class="locations-grid" id="locations-container">
                <div style="padding: 40px; text-align: center; font-family: 'Space Grotesk'; opacity: 0.5; grid-column: 1 / -1;">
                    Loading your saved points...
                </div>
            </section>
        </main>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
