<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather app - Maps</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <style>
        .map-container {
            width: 100%;
            height: 100%;
            border-radius: 48px;
            overflow: hidden;
            position: relative;
            background: var(--surface);
        }
        #map {
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        .map-overlay {
            position: absolute;
            top: 40px;
            right: 40px;
            width: 320px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(40px);
            padding: 40px;
            border-radius: 40px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            z-index: 1000;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .layer-btn {
            padding: 16px 24px;
            border-radius: 20px;
            cursor: pointer;
            color: var(--on-surface-variant);
            font-family: 'Space Grotesk';
            font-weight: 500;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            text-align: center;
        }
        .layer-btn.active {
            background: var(--primary-container);
            color: var(--primary);
            box-shadow: 0 4px 20px rgba(56, 189, 248, 0.1);
        }
        .legend {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        .legend-title {
            font-size: 0.65rem;
            color: var(--on-surface-variant);
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin-bottom: 12px;
        }
        .legend-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            font-family: 'Space Grotesk';
            color: var(--primary);
        }
    </style>
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="logo">Weather app</div>
            <nav class="nav-links">
                <a href="index.html" class="nav-item">Dashboard</a>
                <a href="forecast.html" class="nav-item">Forecast</a>
                <a href="locations.html" class="nav-item">Locations</a>
                <a href="maps.html" class="nav-item active">Maps</a>
            </nav>
            <div style="margin-top: auto; display: flex; flex-direction: column; gap: 8px;">
                <p style="font-size: 0.75rem; color: var(--on-surface-variant); padding: 0 24px;">Made by Sarthak</p>
                <a href="#" class="nav-item" style="padding: 12px 24px; font-size: 0.875rem;">Help</a>
            </div>
        </aside>

        <main class="content">
            <div class="map-container glass">
                <div id="map"></div>
                <div class="map-overlay">
                    <span class="legend-title">Mapping Layers</span>
                    <div class="layer-btn active" onclick="switchLayer('temp_new')">Temperature</div>
                    <div class="layer-btn" onclick="switchLayer('precipitation_new')">Precipitation</div>
                    <div class="layer-btn" onclick="switchLayer('wind_new')">Wind Stream</div>
                    
                    <div class="legend">
                        <span class="legend-title">Atmospheric Intensity</span>
                        <div style="height: 6px; background: linear-gradient(to right, #38bdf8, #fbbf24, #ef4444); border-radius: 99px; margin: 12px 0;"></div>
                        <div class="legend-row">
                            <span>LOW</span>
                            <span>MODERATE</span>
                            <span>HIGH</span>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
    <script>
        const app_key = '25bda5768687695de5yy8787';
        const city = localStorage.getItem('aura_city') || 'Mathura';

        // Default to Mathura coords
        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([27.4924, 77.6737], 6);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        let weatherLayer;
        function switchLayer(layerName) {
            if (weatherLayer) map.removeLayer(weatherLayer);
            weatherLayer = L.tileLayer(`https://tile.openweathermap.org/map/${layerName}/{z}/{x}/{y}.png?appid=${app_key}`, { opacity: 0.6 }).addTo(map);
            document.querySelectorAll('.layer-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent.toLowerCase().includes(layerName.split('_')[0])) btn.classList.add('active');
            });
        }
        switchLayer('temp_new');

        fetch(`https://api.openweathermap.org/geo/1.0/direct?q=${city}&limit=1&appid=${app_key}`)
            .then(res => res.json()).then(data => { if (data.length > 0) map.setView([data[0].lat, data[0].lon], 8); });
    </script>
</body>
</html>
